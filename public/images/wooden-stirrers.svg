<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#f3f4f6"/>
  <defs>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a76a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c9944a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g transform="translate(180, 100)">
    <rect x="0" y="0" width="8" height="480" rx="4" fill="url(#woodGrad)" transform="rotate(-15, 4, 240)"/>
    <rect x="50" y="10" width="8" height="470" rx="4" fill="url(#woodGrad)" transform="rotate(-8, 54, 245)"/>
    <rect x="100" y="15" width="8" height="465" rx="4" fill="url(#woodGrad)" transform="rotate(-2, 104, 247)"/>
    <rect x="150" y="10" width="8" height="470" rx="4" fill="url(#woodGrad)" transform="rotate(4, 154, 245)"/>
    <rect x="200" y="5" width="8" height="475" rx="4" fill="url(#woodGrad)" transform="rotate(10, 204, 242)"/>
    <rect x="250" y="15" width="8" height="465" rx="4" fill="url(#woodGrad)" transform="rotate(16, 254, 247)"/>
    <ellipse cx="125" cy="490" rx="120" ry="15" fill="#d1d5db" opacity="0.2"/>
    <g transform="translate(30, 380)">
      <rect x="0" y="0" width="200" height="25" rx="4" fill="#f5f0e6" stroke="#d4a76a" stroke-width="1"/>
      <text x="100" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b8860b">TOKYO</text>
    </g>
  </g>
  <text x="400" y="700" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#374151" font-weight="bold" direction="rtl">عيدان تقليب خشبية</text>
</svg>
